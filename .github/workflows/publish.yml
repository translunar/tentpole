name: Publish to PyPI

on:
  push:
    tags: ["v*"]

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # OIDC handshake with PyPI trusted publishing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run tests
        run: |
          pip install -e '.[dev]'
          pytest -q
      - name: Build sdist and wheel
        run: |
          pip install build
          python -m build
      - uses: pypa/gh-action-pypi-publish@release/v1
